name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Unit tests
        run: python -m unittest discover -s scripts -p 'test_*.py' -v

  awesome-lint:
    runs-on: ubuntu-latest
    # Advisory while the list stabilizes; required before the
    # sindresorhus/awesome submission (day 30).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx --yes awesome-lint
